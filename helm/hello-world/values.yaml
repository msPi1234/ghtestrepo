# Default Helm chart values for hello-world application
replicaCount: 2

image:
  # Container registry URL without trailing slash
  registry: ghtestreporegistry.azurecr.io
  # Image repository name
  repository: ghtestreporegistry.azurecr.io/hello-world
  # Image pull policy
  pullPolicy: IfNotPresent
  # Image tag override
  tag: "latest"

# Image pull secrets for private registries
imagePullSecrets: []
# - name: acr-secret

# Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# Service configuration
service:
  type: LoadBalancer
  port: 80
  targetPort: 3000
  annotations: {}

# Ingress configuration (optional)
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: hello-world.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: hello-world-tls
  #    hosts:
  #      - hello-world.example.com

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 64Mi

# Autoscaling configuration
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Node selector for pod placement
nodeSelector: {}

# Tolerations for pod scheduling
tolerations: []

# Affinity rules for pod distribution
affinity: {}

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Environment variables
env:
  - name: ENVIRONMENT
    value: "production"
  - name: NODE_ENV
    value: "production"

# Persistence configuration (optional)
persistence:
  enabled: false
  storageClass: default
  size: 1Gi

# Pod disruption budget for high availability
podDisruptionBudget:
  enabled: true
  minAvailable: 1
